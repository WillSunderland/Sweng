version: '3.8'

services:
  # 1. The Orchestrator (LangGraph + API)
  orchestrator:
    build:
      context: .
      dockerfile: backend/orchestrator/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-openai/gpt-oss-120b}
      - HF_SERVER_URL=http://hf-server:8000
      - HF_TIMEOUT=${HF_TIMEOUT:-180}
      - MCP_SERVER_URL=http://mcp-server:8001
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - OPENSEARCH_HOST=elasticsearch
      - OPENSEARCH_INDEX=legislation_chunks
      - INDEX_NAME=${INDEX_NAME:-legislation_chunks}
      - EMBED_MODEL=${EMBED_MODEL:-all-MiniLM-L6-v2}
      - STATE_CODE=${STATE_CODE:-TX}
      - SEARCH_K=${SEARCH_K:-5}
      - FORCE_HF_ONLY=${FORCE_HF_ONLY:-false}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-propylon-sweng-group16}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
    depends_on:
      - mcp-server
      - hf-server
      - elasticsearch

  # 2. The MCP Server (Tools + ElasticSearch Client)
  mcp-server:
    build: ./backend/mcp_server
    ports:
      - "8001:8001"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200

  # 3. Django Auth Server
  django:
    build: ./backend/django_server
    ports:
      - "8080:8080"
    environment:
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=True
    command: >
      sh -c "python manage.py migrate --run-syncdb && python manage.py runserver 0.0.0.0:8080"

  # 4. The Frontend (React UI + Nginx reverse proxy)
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - orchestrator
      - django

  # 5. ElasticSearch (Local dev instance)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9201:9200"

  # 6. HuggingFace Model Server
  hf-server:
    build:
      context: .
      dockerfile: Dockerfile.hf
    ports:
      - "8002:8000"
    environment:
      - MAX_CACHE_ITEMS=3
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # 7. Ingestion Pipeline
  ingestion:
    build:
      context: .
      dockerfile: backend/ingestion/Dockerfile
    environment:
      - CONGRESS_GOV_API_KEY=${CONGRESS_GOV_API_KEY}
      - SEARCH_BACKEND=elasticsearch
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - INDEX_NAME=legislation_chunks
      - EMBED_MODEL=all-MiniLM-L6-v2
      - STATE_CODE=TX
      - SEARCH_LIMIT=100
    depends_on:
      - elasticsearch