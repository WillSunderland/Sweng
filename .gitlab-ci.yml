stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

# ============================================================
# STAGE 1: LINT
# ============================================================

backend-lint:
  stage: lint
  image: python:3.11-slim
  tags:
    - docker
  cache:
    key: backend-lint
    paths:
      - .cache/pip
  script:
    - pip install black ruff
    - black --check backend/
    - ruff check backend/ --select E,W,F --ignore E501
  rules:
    - changes:
        - backend/**/*

frontend-lint:
  stage: lint
  image: node:20-alpine
  tags:
    - docker
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
      - .cache/npm
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run lint

# ============================================================
# STAGE 2: TEST
# ============================================================

backend-test:
  stage: test
  image: python:3.11-slim
  tags:
    - docker
  cache:
    key: backend-deps
    paths:
      - .cache/pip
  before_script:
    - pip install -r backend/orchestrator/requirements.txt
    - pip install -r backend/mcp_server/requirements.txt
    - pip install pytest pytest-cov
  script:
    - >
      pytest backend/
      --cov=backend
      --cov-report=term-missing
      --cov-report=xml:coverage.xml
      --cov-fail-under=80
      --junitxml=report.xml
      -v
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days
  rules:
    - changes:
        - backend/**/*

frontend-test:
  stage: test
  image: node:20-alpine
  tags:
    - docker
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
      - .cache/npm
  before_script:
    - cd frontend
    - npm ci
  script:
    - npx vitest run --reporter=junit --outputFile=../report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    expire_in: 7 days

# ============================================================
# STAGE 3: BUILD
# ============================================================

backend-build:
  stage: build
  image: python:3.11-slim
  tags:
    - docker
  cache:
    key: backend-deps
    paths:
      - .cache/pip
  script:
    - pip install -r backend/orchestrator/requirements.txt
    - pip install -r backend/mcp_server/requirements.txt
  rules:
    - changes:
        - backend/**/*

frontend-build:
  stage: build
  image: node:20-alpine
  tags:
    - docker
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
      - .cache/npm
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build