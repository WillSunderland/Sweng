stages:
  - lint
  - test
  - build
  - sync

# ---- Sync Stage ----

github-sync:
  stage: sync
  image: alpine:3.19
  variables:
    GIT_DEPTH: "0"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache git
  script:
    - git remote add github "https://${GITHUB_TOKEN}@github.com/WillSunderland/Sweng.git"
    - git fetch --all --tags
    - git push github HEAD:refs/heads/main --tags

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

# ============================================================
# STAGE 1: LINT
# ============================================================

backend-lint:
  stage: lint
  image: python:3.11-slim
  cache:
    key: backend-lint
    paths:
      - .cache/pip
  script:
    - pip install black ruff
    - black --check backend/
    - ruff check backend/ --select E,W,F --ignore E501

frontend-lint:
  stage: lint
  image: node:20-alpine
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
      - .cache/npm
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run lint

# ============================================================
# STAGE 2: TEST
# ============================================================

backend-test:
  stage: test
  image: python:3.11-slim
  cache:
    key: backend-deps
    paths:
      - .cache/pip
  before_script:
    - pip install -r backend/orchestrator/requirements.txt
    - pip install -r backend/mcp_server/requirements.txt
    - pip install pytest pytest-cov
  script:
    - |
      PYTHONPATH=. pytest backend/ --ignore=backend/ingestion/test_queries.py --cov=backend --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=report.xml -v || EXIT_CODE=$?
      EXIT_CODE=${EXIT_CODE:-0}
      if [ "$EXIT_CODE" -eq 5 ]; then
        echo "No tests collected (exit 5) — treating as success."
        exit 0
      else
        exit "$EXIT_CODE"
      fi
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days

frontend-test:
  stage: test
  image: node:20-alpine
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
      - .cache/npm
  before_script:
    - cd frontend
    - npm ci
  script:
    - npx vitest run --passWithNoTests --reporter=junit --outputFile=../report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    expire_in: 7 days

# ============================================================
# STAGE 3: BUILD
# ============================================================

backend-build:
  stage: build
  image: python:3.11-slim
  cache:
    key: backend-deps
    paths:
      - .cache/pip
  script:
    - pip install -r backend/orchestrator/requirements.txt
    - pip install -r backend/mcp_server/requirements.txt

# ---- Test Stage ----

backend-unit-tests:
  stage: test
  image: python:3.11-slim
  variables:
    PYTHONPATH: "."
  cache:
    key: pytest
    paths:
      - .pytest_cache/
      - .testmondata
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-testmon
    - pytest --testmon -m "not integration"

backend-integration-tests:
  stage: test
  image: python:3.11-slim
  variables:
    PYTHONPATH: "."
  cache:
    key: pytest
    paths:
      - .pytest_cache/
      - .testmondata
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
  script:
    - pip install -r requirements.txt
    - pip install -r backend/orchestrator/requirements.txt
    - pip install pytest pytest-testmon
    - |
      pytest --testmon -m integration
      status=$?
      if [ $status -eq 5 ]; then
        echo "No integration tests collected."
        exit 0
      fi
      exit $status

frontend-build:
  stage: build
  image: node:20-alpine
  needs:
    - frontend-lint
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
      - .cache/npm
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build
