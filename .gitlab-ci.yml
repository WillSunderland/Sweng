stages:
  - lint
  - test
  - build
  - sync

# ---- Sync Stage ----

github-sync:
  stage: sync
  image: alpine/git:2.45.2
  allow_failure: true
  tags:
    - docker
  variables:
    GIT_DEPTH: "0"
  retry:
    max: 2
    when:
      - script_failure
      - runner_system_failure
      - stuck_or_timeout_failure
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - |
      set -euo pipefail
      if [ -z "${GITHUB_TOKEN:-}" ]; then
        echo "GITHUB_TOKEN is not set; skipping GitHub sync."
        exit 0
      fi
      git config --global --add safe.directory "$CI_PROJECT_DIR"
      GITHUB_REMOTE_URL="https://${GITHUB_TOKEN}@github.com/WillSunderland/Sweng.git"
      if git remote get-url github >/dev/null 2>&1; then
        git remote set-url github "$GITHUB_REMOTE_URL"
      else
        git remote add github "$GITHUB_REMOTE_URL"
      fi
      git fetch origin --tags
      if ! git push github HEAD:refs/heads/main --tags; then
        echo "GitHub sync failed, but this job is non-blocking."
        exit 0
      fi

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

# ============================================================
# STAGE 1: LINT
# ============================================================

backend-lint:
  stage: lint
  image: python:3.11-slim
  tags:
    - docker
  cache:
    key: backend-lint
    paths:
      - .cache/pip
  script:
    - pip install black ruff
    - black --check backend/
    - ruff check backend/ --select E,W,F --ignore E501

frontend-lint:
  stage: lint
  image: node:20-alpine
  tags:
    - docker
  cache:
    key: frontend-npm-v2
    paths:
      - .cache/npm
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run lint

# ============================================================
# STAGE 2: TEST
# ============================================================

backend-test:
  stage: test
  image: python:3.11-slim
  tags:
    - docker
  cache:
    key: backend-deps
    paths:
      - .cache/pip
  before_script:
    - export PYTHONPATH=$PYTHONPATH:backend
    - pip install -r backend/orchestrator/requirements.txt
    - pip install -r backend/mcp_server/requirements.txt
    - pip install pytest pytest-cov
  script:
    - pip install uvicorn
    - uvicorn backend.orchestrator.main:app --host 0.0.0.0 --port 8002 &
    - sleep 5
    - |
      pytest backend/ --ignore=backend/ingestion/test_queries.py --cov=backend --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=report.xml -v || EXIT_CODE=$?
      EXIT_CODE=${EXIT_CODE:-0}
      if [ "$EXIT_CODE" -eq 5 ]; then
        echo "No tests collected (exit 5) — treating as success."
        exit 0
      else
        exit "$EXIT_CODE"
      fi
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days

frontend-test:
  stage: test
  image: node:20-alpine
  tags:
    - docker
  cache:
    key: frontend-npm-v2
    paths:
      - .cache/npm
  before_script:
    - cd frontend
    - npm install
  script:
    - npx vitest run --passWithNoTests --reporter=junit --outputFile=../report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    expire_in: 7 days

# ============================================================
# STAGE 3: BUILD
# ============================================================

backend-build:
  stage: build
  image: python:3.11-slim
  tags:
    - docker
  cache:
    key: backend-deps
    paths:
      - .cache/pip
  script:
    - pip install -r backend/orchestrator/requirements.txt
    - pip install -r backend/mcp_server/requirements.txt

# ---- Test Stage ----

backend-unit-tests:
  stage: test
  image: python:3.11-slim
  tags:
    - docker
  variables:
    PYTHONPATH: "."
  cache:
    key: pytest
    paths:
      - .pytest_cache/
      - .testmondata
  before_script:
    - pip install -r backend/orchestrator/requirements.txt
    - pip install -r backend/mcp_server/requirements.txt
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-testmon
    - pytest --testmon -m "not integration"

backend-integration-tests:
  stage: test
  image: python:3.11-slim
  tags:
    - docker  
  variables:
    PYTHONPATH: "."
  cache:
    key: pytest
    paths:
      - .pytest_cache/
      - .testmondata
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
  before_script:
    - pip install -r backend/orchestrator/requirements.txt
    - pip install -r backend/mcp_server/requirements.txt
  script:
    - pip install -r requirements.txt
    - pip install -r backend/orchestrator/requirements.txt
    - pip install pytest pytest-testmon
    - |
      pytest --testmon -m integration
      status=$?
      if [ $status -eq 5 ]; then
        echo "No integration tests collected."
        exit 0
      fi
      exit $status
frontend-tests:
  stage: test
  image: node:20-alpine
  tags:
    - docker
  needs:
    - frontend-lint
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run test -- --run

frontend-unit-tests:
  stage: test
  image: node:20-alpine
  tags:
    - docker
  needs:
    - frontend-lint
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run test:coverage
  coverage: '/^All files\s*\|\s*[\d.]+\s*\|\s*[\d.]+\s*\|\s*[\d.]+\s*\|\s*([\d.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
    paths:
      - frontend/coverage/
    expire_in: 7 days

    
frontend-build:
  stage: build
  image: node:20-alpine
  tags:
    - docker
  needs:
    - frontend-lint
  cache:
    key: frontend-npm-v2
    paths:
      - .cache/npm
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
